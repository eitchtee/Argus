services:
  web:
    build:
      context: .
      dockerfile: ./docker/prod/django/Dockerfile
    image: argus:latest
    container_name: ${SERVER_NAME}
    ports:
      - "${OUTBOUND_PORT:-8000}:${INTERNAL_PORT:-8000}"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/usr/src/app/data/
      - ./media:/usr/src/app/attachments/
    restart: unless-stopped
