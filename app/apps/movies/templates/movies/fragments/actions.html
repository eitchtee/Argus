{% load i18n %}
<div id="movie-actions" class="flex flex-wrap gap-2">
  <button type="button"
          class="btn btn-sm {% if movie.on_watchlist %}btn-outline{% else %}btn-primary{% endif %}"
          hx-{% if movie.on_watchlist %}delete{% else %}post{% endif %}="{% url 'movie-detail-track' external_id=movie.external_id %}"
          hx-target="#movie-actions" hx-swap="outerHTML" hx-disabled-elt="this">{% if movie.on_watchlist %}{% trans "Untrack" %}{% else %}{% trans "Track" %}{% endif %}</button>
  <button type="button"
          class="btn btn-sm {% if movie.is_seen %}btn-outline{% else %}btn-success{% endif %}"
          hx-{% if movie.is_seen %}delete{% else %}post{% endif %}="{% url 'movie-detail-watched' external_id=movie.external_id %}"
          hx-target="#movie-actions" hx-swap="outerHTML" hx-disabled-elt="this">{% if movie.is_seen %}{% trans "Mark Unwatched" %}{% else %}{% trans "Mark Watched" %}{% endif %}</button>
</div>
