{% load i18n %}
{% with toggle_target=toggle_target|default:"" %}
<c-ui.components.episode-card
    id="watchlist-show-{{ entry.show.id }}"
    :image_url="entry.next_episode.show.poster_url"
    show_url="{% url 'tv-detail' external_id=entry.show.external_id %}{% if entry.show.provider and entry.show.provider != 'tvdb' %}?provider={{ entry.show.provider }}{% endif %}"
    show_name="{{ entry.show.name }}"
    season_episode_label="S{{ entry.next_episode.season_number|stringformat:'02d' }} | E{{ entry.next_episode.episode_number|stringformat:'02d' }}"
    pending_text="{% if entry.pending_count > 0 %}+{{ entry.pending_count }}{% endif %}"
    episode_title="{{ entry.next_episode.name }}"
    title_url="{% url 'tv-episode-detail' external_id=entry.show.external_id episode_id=entry.next_episode.id %}{% if entry.show.provider and entry.show.provider != 'tvdb' %}?provider={{ entry.show.provider }}{% endif %}"
    checkbox_position="right"
    :checked="False"
    toggle_url="{% if watch_toggle_url %}{{ watch_toggle_url }}{% else %}{% url 'tv-home-watchlist-episode-watched' episode_id=entry.next_episode.id %}{% endif %}"
    :toggle_target="toggle_target">
</c-ui.components.episode-card>
{% endwith %}
