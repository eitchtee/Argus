{% load i18n %}

<a href="{% url 'tv-detail' external_id=show.external_id %}{% if show.provider and show.provider != 'tvdb' %}?provider={{ show.provider }}{% endif %}" hx-boost="true"
   data-name="{{ show.name }}"
   class="group card overflow-hidden border border-base-300 bg-base-200/60 transition hover:-translate-y-1 hover:border-primary/50 hover:shadow-lg">
  <figure class="aspect-[2/3] overflow-hidden bg-base-300">
    {% if show.poster_url %}
    <img src="{{ show.poster_url }}" alt="{{ show.name }}" loading="lazy"
         class="h-full w-full object-cover transition duration-300 group-hover:scale-105">
    {% else %}
    <div class="flex h-full w-full items-center justify-center text-base-content/30" aria-hidden="true">
      <i class="fa-solid fa-tv text-4xl"></i>
    </div>
    {% endif %}
  </figure>
  <div class="relative h-6" role="progressbar"
       aria-valuemin="0" aria-valuemax="{{ show.total_episode_count }}"
       aria-valuenow="{{ show.watched_episode_count }}"
       aria-label="{% blocktrans with watched=show.watched_episode_count total=show.total_episode_count %}{{ watched }} of {{ total }} episodes watched{% endblocktrans %}">
    <progress class="progress {% if show.progress_color == 'warning' %}progress-warning{% elif show.progress_color == 'success' %}progress-success{% else %}progress-info{% endif %} block h-full w-full rounded-none [&::-moz-progress-bar]:rounded-none [&::-webkit-progress-bar]:rounded-none [&::-webkit-progress-value]:rounded-none"
              value="{{ show.watched_episode_count }}" max="{% if show.total_episode_count %}{{ show.total_episode_count }}{% else %}1{% endif %}"></progress>
    <span class="pointer-events-none absolute inset-0 flex items-center justify-center text-xs font-bold leading-none text-white drop-shadow-md tabular-nums">
      {{ show.watched_episode_count }}/{{ show.total_episode_count }}
    </span>
  </div>
  <div class="card-body p-3 pt-2">
    <h2 class="truncate text-sm font-semibold" title="{{ show.name }}">{{ show.name }}</h2>
  </div>
</a>
